  # Shared Booster engagement metadata
  booster-engagement:
    type: advisory
    team:
      - name: Ling
        role: Founder
        notes: Setup is hard, handoff to team is messy, not new-user friendly
      - name: Corrie
        role: PM
        notes: Antigravity feels smooth, Claude Code had friction, prototyping workflow
      - name: Josh
        role: Advisor
        notes: Good for blank-slate starts, Rust issues with LLMs, finance/trading
      - name: Luis
        role: Frontend/Backend
        notes: Good for larger features, finds bugs, takes a while to understand existing code
      - name: Chirag
        role: Backend/AI
        notes: Multi-model workflow (GPT planning, Claude code), learning from seniors
      - name: Esau
        role: Frontend
        notes: Farthest along with setup, comfortable with big tasks, planning mode
    stack:
      languages: [Python, TypeScript]
      tools:
        ticketing: Notion
        docs: Notion
        ci_cd: GitHub Actions
        repo: GitHub (GoManzanas org)
    engagement:
      status: active
      goal: "Get engineering team to 2-3x productivity with Claude Code"
      timeline: "2 weeks, ~2 hours of Bryan's time"
      success_metrics:
        - "Corrie & Josh can do easy to moderate features independently"
        - "SW folks feel 2-3x more PR output per week"
      needs:
        - Access to tools / repos
        - A few minutes from team members (async OK)
        - Claude Standard Team plan ($20/seat)
        - One moderately hard ticket to guinea pig the process
