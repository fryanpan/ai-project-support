# Project Registry
# Maps project names to their local paths, GitHub repos, and Linear identifiers.
# The metaproject reads from main worktrees (~/dev/{project}) and proposes changes via GitHub PRs.
#
# Project types:
#   personal  — Bryan owns and develops directly. Full repo access. Changes via PRs.
#   advisory  — External team Bryan helps adopt Claude Code. Bryan has repo + tool
#               access during the engagement. Changes via PRs.
#   collaborator — Non-technical person's project. Bryan sets up, Claude collaborates.

projects:
  health-tool:
    type: personal
    path: ~/dev/health-tool
    repo: fryanpan/health-tool
    linear:
      team_id: 01328a7f-d761-4176-8bbf-004a397dc6f7
      team_key: HEA
    docs:
      learnings: docs/process/learnings.md
      retros: docs/process/retrospective.md
      decisions: docs/product/decisions.md
      claude_md: CLAUDE.md
    skills_dir: .claude/skills
    rules_dir: .claude/rules

  bike-tool:
